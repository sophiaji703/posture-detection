<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hallelujah</title>
  </head>
  <html>
    <head>
        <title>Posture Monitor</title>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
        
        <style>
            h1 {
                font-family: 'Zalando Sans Expanded';
                font-size: 40px;
                background-image: linear-gradient(to bottom, rgb(29, 31, 31), rgb(109, 107, 107));
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
                -webkit-text-fill-color: transparent;
                left: 360px;
                position: absolute;
                top: 100px;
                --animate-duration: 3s;
                
                
            }
         
            
            body {
                background-image: linear-gradient(to right, #ADA996, #F2F2F2, #DBDBDB, #EAEAEA);
            }
            div {
                position: absolute;
                border-radius: 8px;
                width: 500px;
                height: 300px;
                left: 451px;
                top: 260px;

            }
            h2 {
                font-family: 'Zalando Sans Expanded';
                position: absolute;
                left: 524px;
                top: 173px;
                --animate-duration: 5s;
            

            }
            
           
            button {
                position: absolute;
                border-radius: 10px;
                background-color: rgb(29, 31, 31);
                top: 240px;
                left: 595px;
                width: 220px;
                height: 45px;
                --animate-duration: 5s;
                font-family: 'Zalando Sans Expanded';
                font-weight: bold;
                font-size: 15px;
            }

        </style>
    </head>
    
    <body>
      <h1 class="animate__animated animate__fadeInDown">Welcome to Posture Monitor</h1>
      <h2 style="color: rgb(54, 56, 56)" class="animate__animated animate__fadeInDown">Confidence Starts from the Core.</h2>
        
      <button id="start-journey" style="color: rgb(216, 211, 211)" class="animate__animated animate__fadeIn">Get Started</button>
        
        
      <script type="module" src="home.js"></script>
    </body>
</html>
